<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BankBugs|FX Ecosystem</title>
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

   <!-- Independent background layer to isolate the blur effect -->
    <div class="app-bg-blur-layer"></div>
    
  <!-- TOP NAVIGATION BAR WITH HEADER & MARQUEE TICKER -->
    <nav class="top-nav">
        <div class="header-main">
            <div class="brand-zone">
                <img src="img/logo.webp" alt="BankBugs|FX Logo" class="brand-logo">
                <h1 class="brand-name">BankBugs<span>|FX</span></h1>
            </div>
            <!-- Logout action rerouting targeting home.html -->
            <a href="home.html" class="logout-btn">Log Out</a>
        </div>
        
              <!-- Modern TradingView Web-Component Live Ticker -->
        <div class="ticker-bar">
            <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
            <tv-ticker-tape 
                symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,FX:EURUSD,CMCMARKETS:GOLD,OANDA:GBPUSD,FX:USDJPY,OANDA:GBPJPY" 
                item-size="compact"
                theme="dark"
                background-color="transparent">
            </tv-ticker-tape>
        </div>

    <!-- APP MIDDLE CONTENT LAYER VIEWPORT -->
    <main class="app-body" id="appBody">
        <h2 class="welcome-heading">Welcome to Bankbugs|fx</h2>
        <p class="welcome-text">The container layout skeleton is locked. The navigation structural layout auto-scales and shifts padding seamlessly across Android WebViews, screens, tablets, and Desktop monitor panels.</p>
    </main>


        
   <!-- FIXED BOTTOM APP TAB BAR NAVIGATION -->
<nav class="bottom-nav">
    <a href="#" class="bottom-nav-item active">
        <svg class="nav-icon" xmlns="http://w3.org" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
    </a>
    <a href="#" class="bottom-nav-item">
        <svg class="nav-icon" xmlns="http://w3.org" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="18" x="3" y="3" rx="2"/>
            <path d="M9 3v18"/>
            <path d="m14 9 3 3-3 3"/>
        </svg>
        <span>Gateway</span>
    </a>
    <a href="#" class="bottom-nav-item">
        <svg class="nav-icon" xmlns="http://w3.org" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="7" height="9" x="3" y="3" rx="1"/>
            <rect width="7" height="5" x="14" y="3" rx="1"/>
            <rect width="7" height="9" x="14" y="12" rx="1"/>
            <rect width="7" height="5" x="3" y="16" rx="1"/>
        </svg>
        <span>System</span>
    </a>
    <a href="#" class="bottom-nav-item">
        <svg class="nav-icon" xmlns="http://w3.org" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>Trade Room</span>

    <a href="#" class="bottom-nav-item">
        <svg class="nav-icon" xmlns="http://w3.org" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>

        </svg>
        <span>Community</span>
    </a>
</nav>


    <!-- Link to external javascript execution layer -->
    <script src="js/dashboard.js"></script>

</html>
