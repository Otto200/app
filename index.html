<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankBugs|FX - Secure Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Desktop Center Wrapper -->
    <div class="login-wrapper">
        
        <!-- Facebook-Style Centered Container Matrix Modded -->
        <div class="login-card">
            <h1>Log into BankBugs|FX</h1>
            <h2>Existing Trader. Use MT5 ID</h2>
            
            <form id="loginForm" onsubmit="event.preventDefault();">
                <div class="input-group">
                    <label for="mt5Id">MT5 ID</label>
                    <input type="text" id="mt5Id" placeholder="Enter your terminal ID" autocomplete="off" required>
                </div>
                
                <button type="submit" class="btn-login">Login</button>
            </form>
            
            <hr class="separator">
            
            <div class="action-footer">
                <button class="btn-request">New Here? Request Access.</button>
            </div>
        </div>

        <!-- Meta-Style Brand Baseline Footer -->
        <div class="brand-footer">
            <!-- Terminal Security Style SVG Grid Icon -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00FF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <span>BankBugs|FX</span>
        </div>

    </div>

</body>
</html>
